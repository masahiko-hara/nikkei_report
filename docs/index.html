
<html>

<head>

<meta charset="utf-8">

<title>日銀ニュース一覧</title>

<style>

body {
    font-family: sans-serif;
    background:#f5f5f5;
    margin:40px;
}

.card {
    background:white;
    padding:20px;
    margin-bottom:15px;
    border-radius:10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

button {
    background:#ffdddd;
    border:none;
    padding:6px 10px;
    cursor:pointer;
    margin-top:10px;
}

a {
    color: blue;
}

</style>

<script>

function deleteCard(btn, filename){

    if(confirm(filename + " を削除しますか？")){

        btn.parentElement.remove();

        alert(
            "見た目上削除しました。\n" +
            "本当に削除する場合はdocsフォルダから消してください。"
        );
    }
}

</script>

</head>

<body>

<h1>日銀ニュース一覧</h1>



<div class="card">

<h2>2026-05-26</h2>

<p>

</a>
</p>

<button onclick="deleteCard(this, '2026-05-26.html')">

</button>

</div>
